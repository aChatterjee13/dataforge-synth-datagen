openapi: 3.0.3
info:
  title: Pet Store API
  description: A sample API for managing a pet store with inventory, customers, and orders.
  version: 1.2.0
  contact:
    email: support@petstore.example.com

servers:
  - url: https://api.petstore.example.com/v1
    description: Production server
  - url: https://staging-api.petstore.example.com/v1
    description: Staging server

security:
  - bearerAuth: []

paths:
  /pets:
    get:
      summary: List all pets
      operationId: listPets
      tags:
        - pets
      parameters:
        - name: species
          in: query
          description: Filter by species
          required: false
          schema:
            type: string
            enum: [dog, cat, bird, fish, reptile]
        - name: status
          in: query
          description: Filter by availability status
          required: false
          schema:
            type: string
            enum: [available, adopted, pending]
        - name: min_age
          in: query
          description: Minimum age in months
          required: false
          schema:
            type: integer
            minimum: 0
        - name: max_age
          in: query
          description: Maximum age in months
          required: false
          schema:
            type: integer
            maximum: 360
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: A paginated list of pets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Pet'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Add a new pet
      operationId: createPet
      tags:
        - pets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetCreate'
      responses:
        '201':
          description: Pet created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /pets/{petId}:
    get:
      summary: Get a pet by ID
      operationId: getPet
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pet details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      summary: Update a pet
      operationId: updatePet
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetUpdate'
      responses:
        '200':
          description: Pet updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Remove a pet
      operationId: deletePet
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Pet removed
        '404':
          $ref: '#/components/responses/NotFound'

  /customers:
    get:
      summary: List customers
      operationId: listCustomers
      tags:
        - customers
      parameters:
        - name: search
          in: query
          description: Search by name or email
          required: false
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of customers
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Customer'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      summary: Register a new customer
      operationId: createCustomer
      tags:
        - customers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreate'
      responses:
        '201':
          description: Customer registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /customers/{customerId}:
    get:
      summary: Get customer details
      operationId: getCustomer
      tags:
        - customers
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Customer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '404':
          $ref: '#/components/responses/NotFound'

  /adoptions:
    get:
      summary: List adoption records
      operationId: listAdoptions
      tags:
        - adoptions
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, completed, cancelled]
        - name: customer_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of adoption records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Adoption'

    post:
      summary: Submit an adoption application
      operationId: createAdoption
      tags:
        - adoptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdoptionCreate'
      responses:
        '201':
          description: Adoption application submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Adoption'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Pet is not available for adoption
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /adoptions/{adoptionId}:
    patch:
      summary: Update adoption status
      operationId: updateAdoptionStatus
      tags:
        - adoptions
      parameters:
        - name: adoptionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [approved, completed, cancelled]
                notes:
                  type: string
                  maxLength: 500
      responses:
        '200':
          description: Adoption status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Adoption'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /inventory:
    get:
      summary: Get store inventory summary
      operationId: getInventory
      tags:
        - inventory
      responses:
        '200':
          description: Inventory summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_pets:
                    type: integer
                  by_species:
                    type: object
                    additionalProperties:
                      type: integer
                  by_status:
                    type: object
                    additionalProperties:
                      type: integer
                  low_stock_alerts:
                    type: array
                    items:
                      type: object
                      properties:
                        item:
                          type: string
                        current_stock:
                          type: integer
                        reorder_threshold:
                          type: integer

  /auth/login:
    post:
      summary: Authenticate user
      operationId: login
      tags:
        - auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  expires_in:
                    type: integer
                  token_type:
                    type: string
                    example: Bearer
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Pet:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        species:
          type: string
          enum: [dog, cat, bird, fish, reptile]
        breed:
          type: string
        age_months:
          type: integer
        weight_kg:
          type: number
          format: float
        color:
          type: string
        status:
          type: string
          enum: [available, adopted, pending]
        vaccinated:
          type: boolean
        description:
          type: string
        image_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PetCreate:
      type: object
      required:
        - name
        - species
        - age_months
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        species:
          type: string
          enum: [dog, cat, bird, fish, reptile]
        breed:
          type: string
          maxLength: 100
        age_months:
          type: integer
          minimum: 0
          maximum: 360
        weight_kg:
          type: number
          format: float
          minimum: 0.01
          maximum: 200
        color:
          type: string
        vaccinated:
          type: boolean
          default: false
        description:
          type: string
          maxLength: 2000

    PetUpdate:
      type: object
      properties:
        name:
          type: string
        breed:
          type: string
        age_months:
          type: integer
        weight_kg:
          type: number
        color:
          type: string
        status:
          type: string
          enum: [available, adopted, pending]
        vaccinated:
          type: boolean
        description:
          type: string

    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        adoptions_count:
          type: integer
        created_at:
          type: string
          format: date-time

    CustomerCreate:
      type: object
      required:
        - first_name
        - last_name
        - email
      properties:
        first_name:
          type: string
          minLength: 1
          maxLength: 50
        last_name:
          type: string
          minLength: 1
          maxLength: 50
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: '^\+?[1-9]\d{1,14}$'
        address:
          $ref: '#/components/schemas/Address'

    Address:
      type: object
      properties:
        street:
          type: string
        city:
          type: string
        state:
          type: string
        zip_code:
          type: string
        country:
          type: string
          default: US

    Adoption:
      type: object
      properties:
        id:
          type: string
          format: uuid
        pet_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, approved, completed, cancelled]
        adoption_fee:
          type: number
          format: float
        notes:
          type: string
        applied_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true

    AdoptionCreate:
      type: object
      required:
        - pet_id
        - customer_id
      properties:
        pet_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        notes:
          type: string
          maxLength: 500

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
